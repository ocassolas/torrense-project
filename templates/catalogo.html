<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Mercado Torrense</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/catalogo.css') }}">
</head>
<body>
    <!-- Header Fixo -->
    <header class="header">
        <div class="logo-container">
            <div class="logo">
                <!-- Logo Gassen -->
                <img src="{{ url_for('static', filename='img/logo.jpg') }}" alt="Logo GASSEN">
            </div>
        </div>
        <h1 class="header-title">MERCADO TORRENSE</h1>
    </header>

    <!-- Container de Produtos -->
    <main class="produtos-container">
        <div class="produtos-lista" id="produtosLista">
            <div class="loading">Carregando produtos...</div>
        </div>
    </main>

    <script>
        // ====== CONFIGURAÇÕES ======
        const API_ENDPOINT = '/api/produtos';
        const REFRESH_INTERVAL_MS = 30000; // Atualiza a cada 30 segundos

        // ====== ELEMENTOS DOM ======
        const produtosLista = document.getElementById('produtosLista');

        // ====== FUNÇÕES ======
        
        /**
         * Formata o preço no padrão brasileiro
         */
        function formatarPreco(preco) {
            return preco.toFixed(2).replace('.', ',');
        }

        /**
         * Cria o HTML de um item de produto
         */
        function criarProdutoHTML(produto) {
            return `
                <div class="produto-item">
                    <div class="produto-nome">${produto.nome}</div>
                    <div class="produto-preco-container">
                        <span class="produto-preco">${formatarPreco(produto.preco)}</span>
                        <span class="preco-unidade">${produto.unidade || 'kg'}</span>
                    </div>
                </div>
            `;
        }

        /**
         * Atualiza a lista de produtos
         */
        async function atualizarProdutos() {
            try {
                console.log('📦 Buscando produtos...');
                const response = await fetch(API_ENDPOINT);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const produtos = await response.json();
                console.log(`✅ ${produtos.length} produtos carregados`);
                
                // Limpar lista
                produtosLista.innerHTML = '';
                
                // Verificar se há produtos
                if (produtos.length === 0) {
                    produtosLista.innerHTML = '<div class="empty-state">Nenhum produto cadastrado</div>';
                    return;
                }
                
                // Renderizar produtos
                produtos.forEach(produto => {
                    produtosLista.innerHTML += criarProdutoHTML(produto);
                });
                
            } catch (error) {
                console.error('❌ Erro ao buscar produtos:', error);
                produtosLista.innerHTML = `
                    <div class="empty-state" style="color: #E53935;">
                        Erro ao carregar produtos<br>
                        <small style="font-size: 14px; margin-top: 10px; display: block;">${error.message}</small>
                    </div>
                `;
            }
        }

        /**
         * Simula produtos para teste (remover em produção)
         */
        function carregarProdutosTeste() {
            const produtosTeste = [
                { nome: 'PRODUTO 1', preco: 99.99, unidade: 'kg' },
                { nome: 'PRODUTO 2', preco: 45.50, unidade: 'kg' },
                { nome: 'PRODUTO 3', preco: 120.00, unidade: 'kg' },
                { nome: 'PRODUTO 4', preco: 78.90, unidade: 'kg' },
                { nome: 'PRODUTO 5', preco: 33.25, unidade: 'kg' },
            ];

            produtosLista.innerHTML = '';
            produtosTeste.forEach(produto => {
                produtosLista.innerHTML += criarProdutoHTML(produto);
            });
            console.log('🧪 Produtos de teste carregados');
        }

        // ====== INICIALIZAÇÃO ======
        window.addEventListener('load', () => {
            console.log('🚀 Sistema de catálogo iniciado');
            
            // Tentar carregar produtos da API
            atualizarProdutos();
            
            // Atualização periódica
            setInterval(atualizarProdutos, REFRESH_INTERVAL_MS);
            
            // Listener para atualizações via BroadcastChannel (comunicação entre abas)
            try {
                const bc = new BroadcastChannel('precos_channel');
                bc.addEventListener('message', (event) => {
                    if (event.data && event.data.type === 'preco_atualizado') {
                        console.log('📢 Atualização recebida via BroadcastChannel');
                        atualizarProdutos();
                    }
                });
            } catch (e) {
                console.warn('⚠️ BroadcastChannel não disponível:', e);
            }

            // DESCOMENTAR LINHA ABAIXO PARA TESTAR SEM API:
            // carregarProdutosTeste();
        });

        // ====== ATALHOS DE TECLADO (OPCIONAL) ======
        document.addEventListener('keydown', (e) => {
            // F5 ou Ctrl+R: Atualizar produtos
            if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) {
                e.preventDefault();
                atualizarProdutos();
            }
            
            // F11: Toggle fullscreen
            if (e.key === 'F11') {
                e.preventDefault();
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    document.exitFullscreen();
                }
            }
        });
    </script>
</body>
</html>
