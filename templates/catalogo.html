<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Mercado Torrense</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/catalogo.css') }}">
</head>
<body>
    <!-- Header Fixo -->
    <header class="header">
        <div class="logo-container">
            <div class="logo">
                <!-- Logo Gassen -->
                <img src="{{ url_for('static', filename='img/logo.jpg') }}" alt="Logo GASSEN">
            </div>
        </div>
        <h1 class="header-title">MERCADO TORRENSE</h1>
    </header>

    <!-- Container de Produtos -->
    <main class="produtos-container">
        <div class="produtos-lista" id="produtosLista">
            <div class="loading">Carregando produtos...</div>
        </div>
    </main>

    <script>
        var API_ENDPOINT = '/api/produtos';
        var REFRESH_INTERVAL_MS = 30000;
        var SCROLL_SPEED_SECONDS = 20;

        var produtosLista = document.getElementById('produtosLista');

        function formatarPreco(preco) {
            return preco.toFixed(2).replace('.', ',');
        }

        function criarProdutoHTML(produto) {
            return '<div class="produto-item">' +
                '<div class="produto-nome">' + produto.nome + '</div>' +
                '<div class="produto-preco-container">' +
                '<span class="produto-preco">R$ ' + formatarPreco(produto.preco) + '</span>' +
                '<span class="preco-unidade">/ ' + (produto.unidade || 'kg') + '</span>' +
                '</div>' +
                '</div>';
        }

        function configurarScroll(quantidadeProdutos) {
            var dur = Math.max(SCROLL_SPEED_SECONDS, quantidadeProdutos * 3);
            produtosLista.style.WebkitAnimation = 'none';
            produtosLista.style.animation = 'none';
            produtosLista.offsetHeight; // força reflow para reiniciar animação
            produtosLista.style.WebkitAnimation = 'scrollUp ' + dur + 's linear infinite';
            produtosLista.style.animation = 'scrollUp ' + dur + 's linear infinite';
        }

        function atualizarProdutos() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', API_ENDPOINT, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState !== 4) return;
                if (xhr.status === 200) {
                    try {
                        var produtos = JSON.parse(xhr.responseText);
                        produtosLista.innerHTML = '';
                        if (produtos.length === 0) {
                            produtosLista.innerHTML = '<div class="empty-state">Nenhum produto cadastrado</div>';
                            return;
                        }
                        var duplicados = produtos.concat(produtos);
                        var html = '';
                        for (var i = 0; i < duplicados.length; i++) {
                            html += criarProdutoHTML(duplicados[i]);
                        }
                        produtosLista.innerHTML = html;
                        configurarScroll(produtos.length);
                    } catch (e) {
                        produtosLista.innerHTML = '<div class="empty-state" style="color:#E53935;">Erro ao processar dados</div>';
                    }
                } else {
                    produtosLista.innerHTML = '<div class="empty-state" style="color:#E53935;">Erro ao carregar produtos</div>';
                }
            };
            xhr.onerror = function() {
                produtosLista.innerHTML = '<div class="empty-state" style="color:#E53935;">Sem conexao com o servidor</div>';
            };
            xhr.send();
        }

        window.onload = function() {
            atualizarProdutos();
            setInterval(atualizarProdutos, REFRESH_INTERVAL_MS);

            try {
                var bc = new BroadcastChannel('precos_channel');
                bc.addEventListener('message', function(event) {
                    if (event.data && event.data.type === 'preco_atualizado') {
                        atualizarProdutos();
                    }
                });
            } catch (e) {}
        };

        document.addEventListener('keydown', function(e) {
            if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) {
                e.preventDefault();
                atualizarProdutos();
            }
            if (e.key === 'F11') {
                e.preventDefault();
                var el = document.documentElement;
                if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                    if (el.requestFullscreen) el.requestFullscreen();
                    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                }
            }
        });
    </script>
</body>
</html>
